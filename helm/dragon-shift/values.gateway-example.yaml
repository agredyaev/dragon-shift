service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: dragon-shift.example.com
  # Public traffic should terminate TLS at the trusted ingress/gateway or an
  # upstream load balancer in front of it. Do not expose the app directly.
  annotations: {}
  gke:
    staticIpName: ""
    allowHttpSet: false
    allowHttp: false
    managedCertificate:
      enabled: false
      name: ""
      domains: []
  tls:
    enabled: false
    secretName: ""

app:
  port: 3000
  allowedOrigins: https://dragon-shift.example.com
  viteAppUrl: https://dragon-shift.example.com
  staticDir: /app/static
  rustSessionCodePrefix: "9"
  # Only trust forwarded client IPs when a trusted edge normalizes them.
  trustForwardedFor: true
  createRateLimitMax: 20
  joinRateLimitMax: 180
  commandRateLimitMax: 180
  socketRateLimitMax: 500
  googleCloudProject: my-gcp-project
  googleCloudLocation: us-central1
  judgeProviders:
    - type: vertex_ai
      model: gemini-2.5-flash
  imageProviders:
    - type: vertex_ai
      model: gemini-2.5-flash-preview-04-17
  extraEnv: []

database:
  url: ""
  existingSecretName: dragon-shift-app
  existingSecretKey: DATABASE_URL

postgresql:
  enabled: false

replicaCount: 1
# Keep production at a single app replica; horizontal scaling/autoscaling are
# unsupported until the runtime gains distributed coordination.

serviceAccount:
  create: true
  name: dragon-shift
  automountServiceAccountToken: true
  annotations:
    iam.gke.io/gcp-service-account: dragon-shift@my-gcp-project.iam.gserviceaccount.com
