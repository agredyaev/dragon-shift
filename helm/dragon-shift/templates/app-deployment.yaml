apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dragon-shift.app.fullname" . }}
  labels:
    {{- include "dragon-shift.app.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if ne (int .Values.replicaCount) 1 }}
  {{- fail "replicaCount must remain 1 for the current singleton runtime" }}
  {{- end }}
  {{- if .Values.autoscaling.enabled }}
  {{- fail "autoscaling.enabled must remain false for the current singleton runtime" }}
  {{- end }}
  {{- if ne .Values.deploymentStrategy.type "Recreate" }}
  {{- fail "deploymentStrategy.type must remain Recreate for the current singleton runtime" }}
  {{- end }}
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  minReadySeconds: {{ .Values.minReadySeconds }}
  strategy:
    type: {{ .Values.deploymentStrategy.type }}
    {{- if and (eq .Values.deploymentStrategy.type "RollingUpdate") .Values.deploymentStrategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml .Values.deploymentStrategy.rollingUpdate | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "dragon-shift.app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dragon-shift.app.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dragon-shift.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      enableServiceLinks: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app-server
          image: {{ include "dragon-shift.app.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: RUST_LOG
              value: {{ .Values.app.rustLog | quote }}
            - name: APP_SERVER_BIND_ADDR
              value: 0.0.0.0:{{ .Values.app.port }}
            - name: APP_SERVER_STATIC_DIR
              value: {{ .Values.app.staticDir | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.app.allowedOrigins | quote }}
            - name: VITE_APP_URL
              value: {{ .Values.app.viteAppUrl | quote }}
            - name: RUST_SESSION_CODE_PREFIX
              value: {{ .Values.app.rustSessionCodePrefix | quote }}
            - name: TRUST_X_FORWARDED_FOR
              value: {{ ternary "true" "false" .Values.app.trustForwardedFor | quote }}
            - name: CREATE_RATE_LIMIT_MAX
              value: {{ .Values.app.createRateLimitMax | quote }}
            - name: JOIN_RATE_LIMIT_MAX
              value: {{ .Values.app.joinRateLimitMax | quote }}
            - name: SIGNUP_RATE_LIMIT_MAX
              value: {{ .Values.app.signupRateLimitMax | quote }}
            - name: LOGIN_RATE_LIMIT_MAX
              value: {{ .Values.app.loginRateLimitMax | quote }}
            - name: COMMAND_RATE_LIMIT_MAX
              value: {{ .Values.app.commandRateLimitMax | quote }}
            - name: WEBSOCKET_RATE_LIMIT_MAX
              value: {{ .Values.app.socketRateLimitMax | quote }}
            - name: SPRITE_QUEUE_TIMEOUT_SECONDS
              value: {{ .Values.app.spriteQueueTimeoutSeconds | quote }}
            - name: IMAGE_JOB_MAX_CONCURRENCY
              value: {{ .Values.app.imageJobMaxConcurrency | quote }}
            - name: DATABASE_POOL_SIZE
              value: {{ .Values.app.databasePoolSize | quote }}
            {{- with .Values.app.googleCloudProject }}
            - name: GOOGLE_CLOUD_PROJECT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.app.googleCloudLocation }}
            - name: GOOGLE_CLOUD_LOCATION
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.gcpCredentials.enabled }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ .Values.gcpCredentials.mountPath | quote }}
            {{- end }}
            {{- if .Values.app.judgeProviders }}
            - name: LLM_JUDGE_PROVIDERS
              value: {{ include "dragon-shift.llmProviderEntries" (dict "providers" .Values.app.judgeProviders "role" "JUDGE") | quote }}
            {{- range $i, $p := .Values.app.judgeProviders }}
            {{- if and (eq $p.type "api_key") $p.apiKeySecretName }}
            - name: LLM_JUDGE_API_KEY_{{ $i }}
              valueFrom:
                secretKeyRef:
                  name: {{ $p.apiKeySecretName | quote }}
                  key: {{ $p.apiKeySecretKey | default (printf "LLM_JUDGE_API_KEY_%d" $i) | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.app.imageProviders }}
            - name: LLM_IMAGE_PROVIDERS
              value: {{ include "dragon-shift.llmProviderEntries" (dict "providers" .Values.app.imageProviders "role" "IMAGE") | quote }}
            {{- range $i, $p := .Values.app.imageProviders }}
            {{- if and (eq $p.type "api_key") $p.apiKeySecretName }}
            - name: LLM_IMAGE_API_KEY_{{ $i }}
              valueFrom:
                secretKeyRef:
                  name: {{ $p.apiKeySecretName | quote }}
                  key: {{ $p.apiKeySecretKey | default (printf "LLM_IMAGE_API_KEY_%d" $i) | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.database.url }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- else if .Values.database.existingSecretName }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                   name: {{ .Values.database.existingSecretName | quote }}
                   key: {{ .Values.database.existingSecretKey | quote }}
            {{- else if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: {{ include "dragon-shift.databaseUrl" . | quote }}
            {{- end }}
            {{- if .Values.sessionCookieKey.existingSecretName }}
            - name: SESSION_COOKIE_KEY
              valueFrom:
                secretKeyRef:
                   name: {{ .Values.sessionCookieKey.existingSecretName | quote }}
                   key: {{ .Values.sessionCookieKey.existingSecretKey | quote }}
            {{- end }}
            {{- with .Values.app.extraEnv }}
{{ toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path }}
              port: http
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.gcpCredentials.enabled }}
            - name: gcp-credentials
              mountPath: {{ .Values.gcpCredentials.mountPath | quote }}
              subPath: {{ .Values.gcpCredentials.secretKey | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.gcpCredentials.enabled }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.gcpCredentials.secretName | quote }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
