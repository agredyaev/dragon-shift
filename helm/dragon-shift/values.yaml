image:
  repository: ghcr.io/your-org/dragon-switch
  tag: v0.1.0
  digest: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  nodePort: null

ingress:
  enabled: false
  className: ""
  host: dragon-shift.example.com
  annotations: {}
  tls:
    enabled: false
    secretName: ""

app:
  port: 3000
  allowedOrigins: https://dragon-shift.example.com
  viteAppUrl: https://dragon-shift.example.com
  staticDir: /app/static
  rustSessionCodePrefix: "9"
  trustForwardedFor: false
  databasePoolSize: 10
  createRateLimitMax: 20
  joinRateLimitMax: 40
  commandRateLimitMax: 120
  socketRateLimitMax: 300

database:
  url: ""
  existingSecretName: ""
  existingSecretKey: DATABASE_URL

postgresql:
  # Bundled Postgres is the local/dev default. For cloud production, prefer an
  # external managed Postgres/Cloud SQL instance with `postgresql.enabled=false`
  # and a secret-backed `DATABASE_URL`.
  enabled: true
  auth:
    username: dragon_shift
    password: dragon-shift-local
    database: dragon_shift
  primary:
    persistence:
      enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  # Unsupported today: the runtime is intentionally singleton-only, so do not
  # enable HPA/autoscaling until realtime ownership and fan-out are distributed.
  enabled: false

imagePullSecrets: []

deploymentAnnotations: {}

podLabels: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

startupProbe:
  enabled: true
  path: /api/live
  failureThreshold: 30
  periodSeconds: 5

deploymentStrategy:
  # The current runtime is a singleton authoritative process, so default
  # upgrades must not overlap old and new pods.
  type: Recreate

revisionHistoryLimit: 2

minReadySeconds: 5

terminationGracePeriodSeconds: 30

nodeSelector: {}

tolerations: []

affinity: {}

replicaCount: 1
# Production is single-replica only today. Keep this at 1; multi-replica
# operation and horizontal scaling are unsupported until the runtime gains
# distributed coordination for authoritative workshop ownership and socket fan-out.

podDisruptionBudget:
  enabled: true
  minAvailable: 1
