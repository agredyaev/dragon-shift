{{- if not .Values.legacy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dragon-shift.app.fullname" . }}
  labels:
    {{- include "dragon-shift.app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dragon-shift.app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dragon-shift.app.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dragon-shift.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: APP_SERVER_BIND_ADDR
              value: 0.0.0.0:{{ .Values.app.port }}
            - name: APP_SERVER_STATIC_DIR
              value: {{ .Values.app.staticDir | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.app.allowedOrigins | quote }}
            - name: VITE_APP_URL
              value: {{ .Values.app.viteAppUrl | quote }}
            - name: RUST_SESSION_CODE_PREFIX
              value: {{ .Values.app.rustSessionCodePrefix | quote }}
            {{- if .Values.database.url }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- else if .Values.database.existingSecretName }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecretName | quote }}
                  key: {{ .Values.database.existingSecretKey | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
