{{- if and (not .Values.legacy.enabled) .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dragon-shift.serviceAccountName" . }}
  labels:
    {{- include "dragon-shift.app.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
