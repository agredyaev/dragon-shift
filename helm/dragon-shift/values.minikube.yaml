image:
  repository: dragon-shift-rust
  tag: minikube
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  targetPort: 3000
  nodePort: 39000

ingress:
  enabled: false

app:
  port: 3000
  allowedOrigins: http://127.0.0.1:39000
  viteAppUrl: http://127.0.0.1:39000
  staticDir: /app/static
  rustSessionCodePrefix: "9"
  databasePoolSize: 5
  geminiApiKey: ""
  trustProxyHeaders: false
  joinRateLimitMax: 120
  joinRateLimitWindowMs: 60000
  socketRateLimitMax: 300
  socketRateLimitWindowMs: 60000

database:
  url: ""
  existingSecretName: ""
  existingSecretKey: DATABASE_URL

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

podDisruptionBudget:
  enabled: false

replicaCount: 1
