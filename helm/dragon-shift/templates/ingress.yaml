{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dragon-shift.fullname" . }}
  labels:
    {{- include "dragon-shift.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ if .Values.legacy.enabled }}{{ include "dragon-shift.gateway.fullname" . }}{{ else }}{{ include "dragon-shift.app.fullname" . }}{{ end }}
                port:
                  number: {{ if .Values.legacy.enabled }}{{ .Values.gatewayService.port }}{{ else }}{{ .Values.service.port }}{{ end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
