image:
  repository: ghcr.io/agredyaev/dragon-shift
  tag: v0.1.0
  digest: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  nodePort: null
  annotations: {}

ingress:
  enabled: false
  className: ""
  host: dragon-shift.example.com
  annotations: {}
  gke:
    staticIpName: ""
    allowHttpSet: false
    allowHttp: false
    managedCertificate:
      enabled: false
      name: ""
      domains: []
  tls:
    enabled: false
    secretName: ""

app:
  nodeEnv: production
  port: 3000
  allowedOrigins: https://dragon-shift.example.com
  viteAppUrl: https://dragon-shift.example.com
  staticDir: /app/static
  rustLog: "info,tower_http=debug"
  rustSessionCodePrefix: "9"
  trustForwardedFor: true
  databasePoolSize: 10
  sessionLeaseEnabled: true
  createRateLimitMax: 20
  joinRateLimitMax: 100
  signupRateLimitMax: 80
  loginRateLimitMax: 80
  commandRateLimitMax: 120
  socketRateLimitMax: 300
  spriteQueueTimeoutSeconds: 1200
  imageJobMaxConcurrency: 2
  googleCloudProject: ""
  googleCloudLocation: ""
  # Provider pool arrays — ordered by preference; failover happens left-to-right.
  # Each entry: type (vertex_ai | api_key), model, and optionally
  # apiKeySecretName / apiKeySecretKey for api_key providers.
  judgeProviders: []
  # - type: vertex_ai
  #   model: gemini-2.5-flash
  # - type: api_key
  #   model: gemini-2.5-flash
  #   apiKeySecretName: dragon-shift-llm
  #   apiKeySecretKey: LLM_JUDGE_API_KEY_0
  imageProviders: []
  # - type: vertex_ai
  #   model: gemini-2.5-flash-image
  extraEnv: []

database:
  url: ""
  existingSecretName: ""
  existingSecretKey: DATABASE_URL

sessionCookieKey:
  # Base64-encoded random bytes (>=64 decoded bytes) used by the app to sign
  # and encrypt session cookies. Required in production; without it the app
  # fails fast on startup (`SESSION_COOKIE_KEY is required when NODE_ENV=production`).
  # Generate once per environment with: `openssl rand -base64 64`
  existingSecretName: ""
  existingSecretKey: SESSION_COOKIE_KEY

postgresql:
  # Bundled Postgres is the local/dev default. For cloud production, prefer an
  # external managed Postgres/Cloud SQL instance with `postgresql.enabled=false`
  # and a secret-backed `DATABASE_URL`.
  enabled: true
  auth:
    username: dragon_shift
    password: dragon-shift-local
    database: dragon_shift
  primary:
    persistence:
      enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  # Unsupported today: the runtime is intentionally singleton-only, so do not
  # enable HPA/autoscaling until realtime ownership and fan-out are distributed.
  enabled: false

imagePullSecrets: []

deploymentAnnotations: {}

podLabels: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

gcpCredentials:
  enabled: false
  secretName: ""
  secretKey: credentials.json
  mountPath: /var/secrets/google/credentials.json

podAnnotations: {}

podSecurityContext:
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

startupProbe:
  enabled: true
  path: /api/live
  failureThreshold: 30
  periodSeconds: 5

deploymentStrategy:
  # The current runtime is a singleton authoritative process, so default
  # upgrades must not overlap old and new pods.
  type: Recreate

revisionHistoryLimit: 2

minReadySeconds: 5

terminationGracePeriodSeconds: 30

nodeSelector: {}

tolerations: []

affinity: {}

replicaCount: 1
# Production is single-replica only today. Keep this at 1; multi-replica
# operation and horizontal scaling are unsupported until the runtime gains
# distributed coordination for authoritative workshop ownership and socket fan-out.

podDisruptionBudget:
  enabled: true
  minAvailable: 1
