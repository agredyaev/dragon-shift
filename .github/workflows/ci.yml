name: CI

on:
  pull_request:
    paths:
      - ".dockerignore"
      - "platform/**"
      - "e2e/**"
      - "helm/**"
      - "operations/**"
      - "terraform/**"
      - "Dockerfile"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - "platform/**"
      - "e2e/**"
      - "helm/**"
      - "operations/**"
      - "terraform/**"
      - "Dockerfile"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  BINARYEN_SHA256_X86_64_LINUX: 50b9fa62b9abea752da92ec57e0c555fee578760cd237c40107957715d2976ba
  BINARYEN_VERSION: 129
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            platform -> target

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo test
        run: cargo test --workspace

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.115 --locked

      - name: Install binaryen
        run: |
          curl -fsSL -o /tmp/binaryen.tar.gz "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          echo "${BINARYEN_SHA256_X86_64_LINUX}  /tmp/binaryen.tar.gz" | sha256sum -c -
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build web bundle
        run: cargo run --locked -p xtask -- build-web --out-dir /tmp/app-web-dist

  e2e-restart:
    name: Browser restart reconnect proof
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dragon_shift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dragon_shift_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            platform -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.115 --locked
        working-directory: platform

      - name: Install binaryen
        run: |
          curl -fsSL -o /tmp/binaryen.tar.gz "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          echo "${BINARYEN_SHA256_X86_64_LINUX}  /tmp/binaryen.tar.gz" | sha256sum -c -
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-version_${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build app-web bundle
        run: cargo run --locked -p xtask -- build-web --out-dir app-web/dist
        working-directory: platform

      - name: Build app-server
        run: cargo build -p app-server
        working-directory: platform

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run browser restart reconnect proof
        run: npm run test:restart-local
        working-directory: e2e
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/dragon_shift_test
          TEST_DATABASE_SCHEMA: ci_e2e_restart

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: >-
          helm lint ./helm/dragon-shift
          --set image.repository=ghcr.io/agredyaev/dragon-shift
          --set image.digest=sha256:1111111111111111111111111111111111111111111111111111111111111111
          --set app.allowedOrigins=https://dragon-shift.example.com
          --set app.viteAppUrl=https://dragon-shift.example.com
          --set postgresql.enabled=false
          --set database.existingSecretName=dragon-shift-app
          --set database.existingSecretKey=DATABASE_URL

      - name: Helm template
        run: >-
          helm template dragon-shift ./helm/dragon-shift
          --set image.repository=ghcr.io/agredyaev/dragon-shift
          --set image.digest=sha256:1111111111111111111111111111111111111111111111111111111111111111
          --set app.allowedOrigins=https://dragon-shift.example.com
          --set app.viteAppUrl=https://dragon-shift.example.com
          --set postgresql.enabled=false
          --set database.existingSecretName=dragon-shift-app
          --set database.existingSecretKey=DATABASE_URL
          > /tmp/dragon-shift-rendered.yaml

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform

      - name: Validate bootstrap
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/bootstrap

      - name: Validate production foundation
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/environments/production/foundation

      - name: Validate production platform
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/environments/production/platform

      - name: Validate deployment automation script syntax
        run: bash -n operations/terraform-apply.sh

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build --platform linux/amd64 --tag dragon-shift:ci .
