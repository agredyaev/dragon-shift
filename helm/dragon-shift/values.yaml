image:
  repository: ghcr.io/your-org/dragon-shift-rust
  tag: 0.1.0
  digest: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  nodePort: null

ingress:
  enabled: false
  className: ""
  host: dragon-shift.example.com
  annotations: {}
  tls:
    enabled: false
    secretName: ""

app:
  port: 3000
  allowedOrigins: https://dragon-shift.example.com
  viteAppUrl: https://dragon-shift.example.com
  staticDir: /app/static
  rustSessionCodePrefix: "9"
  databasePoolSize: 10
  geminiApiKey: ""
  trustProxyHeaders: true
  joinRateLimitMax: 120
  joinRateLimitWindowMs: 60000
  socketRateLimitMax: 300
  socketRateLimitWindowMs: 60000

database:
  url: ""
  existingSecretName: ""
  existingSecretKey: DATABASE_URL

postgresql:
  enabled: true
  auth:
    username: dragon_shift
    password: dragon-shift-local
    database: dragon_shift
  primary:
    persistence:
      enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: false

imagePullSecrets: []

deploymentAnnotations: {}

podLabels: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}

podSecurityContext:
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

startupProbe:
  enabled: true
  path: /api/live
  failureThreshold: 30
  periodSeconds: 5

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

revisionHistoryLimit: 2

minReadySeconds: 5

terminationGracePeriodSeconds: 30

nodeSelector: {}

tolerations: []

affinity: {}

replicaCount: 1

podDisruptionBudget:
  enabled: true
  minAvailable: 1
