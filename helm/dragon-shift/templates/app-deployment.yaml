apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dragon-shift.app.fullname" . }}
  labels:
    {{- include "dragon-shift.app.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if ne .Values.deploymentStrategy.type "Recreate" }}
  {{- fail "deploymentStrategy.type must remain Recreate for the current singleton runtime" }}
  {{- end }}
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  minReadySeconds: {{ .Values.minReadySeconds }}
  strategy:
    type: {{ .Values.deploymentStrategy.type }}
    {{- if and (eq .Values.deploymentStrategy.type "RollingUpdate") .Values.deploymentStrategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml .Values.deploymentStrategy.rollingUpdate | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "dragon-shift.app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dragon-shift.app.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dragon-shift.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      enableServiceLinks: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app-server
          image: {{ include "dragon-shift.app.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: APP_SERVER_BIND_ADDR
              value: 0.0.0.0:{{ .Values.app.port }}
            - name: APP_SERVER_STATIC_DIR
              value: {{ .Values.app.staticDir | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.app.allowedOrigins | quote }}
            - name: VITE_APP_URL
              value: {{ .Values.app.viteAppUrl | quote }}
            - name: RUST_SESSION_CODE_PREFIX
              value: {{ .Values.app.rustSessionCodePrefix | quote }}
            - name: TRUST_X_FORWARDED_FOR
              value: {{ ternary "true" "false" .Values.app.trustForwardedFor | quote }}
            - name: CREATE_RATE_LIMIT_MAX
              value: {{ .Values.app.createRateLimitMax | quote }}
            - name: JOIN_RATE_LIMIT_MAX
              value: {{ .Values.app.joinRateLimitMax | quote }}
            - name: COMMAND_RATE_LIMIT_MAX
              value: {{ .Values.app.commandRateLimitMax | quote }}
            - name: WEBSOCKET_RATE_LIMIT_MAX
              value: {{ .Values.app.socketRateLimitMax | quote }}
            - name: DATABASE_POOL_SIZE
              value: {{ .Values.app.databasePoolSize | quote }}
            {{- if .Values.database.url }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- else if .Values.database.existingSecretName }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                   name: {{ .Values.database.existingSecretName | quote }}
                   key: {{ .Values.database.existingSecretKey | quote }}
            {{- else if .Values.database.existingSecretFile }}
            - name: DATABASE_URL_FILE
              value: {{ .Values.database.existingSecretFile | quote }}
            {{- else if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: {{ include "dragon-shift.databaseUrl" . | quote }}
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path }}
              port: http
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.secretManager.enabled }}
            - name: secret-manager
              mountPath: {{ .Values.secretManager.mountPath | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.secretManager.enabled }}
        - name: secret-manager
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ required "secretManager.secretProviderClassName is required when secretManager.enabled=true" .Values.secretManager.secretProviderClassName | quote }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
