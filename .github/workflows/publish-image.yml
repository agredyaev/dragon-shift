name: Publish Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish when running manually
        required: false
        default: manual
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "platform/**"
      - "helm/**"
      - "Dockerfile"
      - ".github/workflows/**"
      - "README.md"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags
        id: vars
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_TAG}" ]]; then
            VERSION="${INPUT_TAG}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            VERSION="main"
          else
            VERSION="manual-${SHORT_SHA}"
          fi
          {
            echo "version=${VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            echo "${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" || ( "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" ) ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/agredyaev/dragon-shift
            org.opencontainers.image.revision=${{ github.sha }}
