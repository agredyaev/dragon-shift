image:
  repository: dragon-shift-rust
  tag: minikube
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  targetPort: 3000
  nodePort: 32000

ingress:
  enabled: false

app:
  port: 3000
  allowedOrigins: http://127.0.0.1:32000
  viteAppUrl: http://127.0.0.1:32000
  staticDir: /app/static
  rustLog: "info,tower_http=debug,app_server=debug"
  rustSessionCodePrefix: "9"
  databasePoolSize: 5
  createRateLimitMax: 20
  joinRateLimitMax: 40
  commandRateLimitMax: 120
  socketRateLimitMax: 300
  googleCloudProject: ""
  googleCloudLocation: ""
  judgeProviders:
    - type: api_key
      model: gemini-2.5-flash
      apiKeySecretName: dragon-shift-llm
      apiKeySecretKey: LLM_JUDGE_API_KEY_0
  imageProviders:
    - type: api_key
      model: gemini-2.5-flash-preview-04-17
      apiKeySecretName: dragon-shift-llm
      apiKeySecretKey: LLM_IMAGE_API_KEY_0
  extraEnv: []

database:
  url: ""
  existingSecretName: ""
  existingSecretKey: DATABASE_URL

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

podDisruptionBudget:
  enabled: false

replicaCount: 1
