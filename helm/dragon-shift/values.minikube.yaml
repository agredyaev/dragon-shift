image:
  repository: dragon-shift-rust
  tag: minikube
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  targetPort: 3000
  nodePort: 32000

ingress:
  enabled: false

app:
  port: 3000
  allowedOrigins: http://127.0.0.1:32000
  viteAppUrl: http://127.0.0.1:32000
  staticDir: /app/static
  rustSessionCodePrefix: "9"
  databasePoolSize: 5
  createRateLimitMax: 20
  joinRateLimitMax: 40
  commandRateLimitMax: 120
  socketRateLimitMax: 300

database:
  url: ""
  existingSecretName: ""
  existingSecretKey: DATABASE_URL

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

podDisruptionBudget:
  enabled: false

replicaCount: 1
