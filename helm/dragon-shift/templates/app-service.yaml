apiVersion: v1
kind: Service
metadata:
  name: {{ include "dragon-shift.app.fullname" . }}
  labels:
    {{- include "dragon-shift.app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "dragon-shift.app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      {{- with .Values.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
      protocol: TCP
